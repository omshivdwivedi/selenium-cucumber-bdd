# Enable Spark report
extent.reporter.spark.start=true

# Output path
extent.reporter.spark.out=reports/cucumber-html-report.html

# Theme (closest equivalent)
extent.reporter.spark.theme=dark
# or standard

# View hierarchy (IMPORTANT)
extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log

# Screenshots (auto embed)
extent.reporter.spark.base64imagesrc=true

# System info (optional)
systeminfo.project=CucumberTestReport
systeminfo.user=Automation